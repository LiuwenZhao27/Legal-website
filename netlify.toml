# Netlify ???? - ??????????
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # ????,?????
  publish = "."

# SPA ??:??????? index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ?????
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
